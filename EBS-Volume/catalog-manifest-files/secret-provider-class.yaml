apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProvideClass
metadata:
  name: catalog-db-service
spec:
  provider: aws
  parameters: 
    objects: |
      - objectName: "catalog-db-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: "MYSQL_USER"
            objectAlias: "MYSQL_USER"
          - path: "MYSQL_PASSWORD"
            objectAlias: "MYSQL_PASSWORD"
    usePodIdentity: "true"            